        <style>
            :root {
                --gold: #c9a84c;
                --gold-light: #e8c97a;
                --dark: #0e1a12;
                --green: #1a3d2b;
                --green-light: #2a5e42;
                --cream: #f5f0e8;
                --text: #f0ead8;
                --muted: #9aad9a;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--dark);
                color: var(--text);
                font-family: "Raleway", sans-serif;
                min-height: 100vh;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    radial-gradient(
                        circle at 20% 20%,
                        rgba(201, 168, 76, 0.06) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 80% 80%,
                        rgba(26, 61, 43, 0.4) 0%,
                        transparent 50%
                    );
                pointer-events: none;
                z-index: 0;
            }

            .container {
                max-width: 960px;
                margin: 0 auto;
                padding: 40px 20px 20px;
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            @media (max-width: 600px) {
                .container {
                    padding: 24px 16px 20px;
                }
            }

            header {
                text-align: center;
                margin-bottom: 44px;
            }

            .arabic-header {
                font-family: "Amiri", serif;
                font-size: 2.2rem;
                color: var(--gold);
                letter-spacing: 2px;
                margin-bottom: 8px;
                text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
            }

            header h1 {
                font-size: 1.4rem;
                font-weight: 700;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--cream);
                margin-bottom: 6px;
            }

            header p {
                color: var(--muted);
                font-weight: 300;
                font-size: 0.88rem;
                letter-spacing: 1px;
            }

            .divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 14px 0;
                justify-content: center;
            }

            .divider-line {
                flex: 1;
                max-width: 100px;
                height: 1px;
                background: linear-gradient(to right, transparent, var(--gold));
            }

            .divider-line.right {
                background: linear-gradient(to left, transparent, var(--gold));
            }

            .divider-diamond {
                width: 8px;
                height: 8px;
                background: var(--gold);
                transform: rotate(45deg);
            }

            .card {
                background: rgba(22, 33, 24, 0.8);
                border: 1px solid rgba(201, 168, 76, 0.15);
                border-radius: 16px;
                padding: 26px 30px;
                margin-bottom: 20px;
                backdrop-filter: blur(12px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                transition:
                    transform 0.3s ease,
                    border-color 0.3s ease;
            }

            .card:hover {
                border-color: rgba(201, 168, 76, 0.3);
            }

            .card-title {
                font-size: 0.68rem;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--gold);
                margin-bottom: 18px;
                font-weight: 600;
            }

            /* STEP 1 */
            .step-row {
                display: flex;
                gap: 16px;
                align-items: flex-end;
                flex-wrap: wrap;
            }

            .form-group {
                flex: 1;
                min-width: 130px;
            }

            .form-group label {
                display: block;
                font-size: 0.74rem;
                color: var(--muted);
                margin-bottom: 6px;
                letter-spacing: 1px;
                font-weight: 600;
            }

            .form-group input[type="number"] {
                width: 100%;
                background: rgba(14, 26, 18, 0.8);
                border: 1px solid rgba(201, 168, 76, 0.25);
                border-radius: 7px;
                padding: 10px 14px;
                color: var(--cream);
                font-family: "Raleway", sans-serif;
                font-size: 1rem;
                font-weight: 600;
                transition: border-color 0.2s;
                -webkit-appearance: none;
            }

            .form-group input[type="number"]:focus {
                outline: none;
                border-color: var(--gold);
                box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
            }

            .btn-sm {
                background: linear-gradient(
                    135deg,
                    var(--green-light),
                    var(--green)
                );
                border: 1px solid rgba(201, 168, 76, 0.6);
                color: var(--gold-light);
                font-family: "Raleway", sans-serif;
                font-size: 0.8rem;
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: uppercase;
                padding: 11px 22px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .btn-sm:hover {
                background: linear-gradient(
                    135deg,
                    #3a7a58,
                    var(--green-light)
                );
                box-shadow: 0 4px 20px rgba(201, 168, 76, 0.2);
                transform: translateY(-1px);
            }

            .btn-outline {
                background: rgba(14, 26, 18, 0.8);
                border-color: rgba(201, 168, 76, 0.3);
            }

            /* STEP 2 */
            #groupSetup {
                display: none;
            }

            .group-setup-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 12px;
                margin-bottom: 20px;
            }

            @media (max-width: 480px) {
                .group-setup-grid {
                    grid-template-columns: 1fr;
                }
            }

            .group-setup-item {
                background: rgba(14, 26, 18, 0.6);
                border: 1px solid rgba(201, 168, 76, 0.15);
                border-radius: 9px;
                padding: 12px 14px;
                display: flex;
                flex-direction: column;
                gap: 7px;
            }

            .group-setup-item label {
                font-size: 0.63rem;
                letter-spacing: 2px;
                color: var(--gold);
                font-weight: 700;
                text-transform: uppercase;
            }

            .group-setup-item input {
                background: rgba(14, 26, 18, 0.9);
                border: 1px solid rgba(201, 168, 76, 0.2);
                border-radius: 5px;
                padding: 7px 10px;
                color: var(--cream);
                font-family: "Raleway", sans-serif;
                font-size: 0.95rem;
                font-weight: 700;
                width: 100%;
                outline: none;
                transition: border-color 0.2s;
                -webkit-appearance: none;
            }

            .group-setup-item input:focus {
                border-color: var(--gold);
            }

            .preview-box {
                padding: 10px 14px;
                background: rgba(201, 168, 76, 0.05);
                border-radius: 8px;
                border: 1px dashed rgba(201, 168, 76, 0.2);
                font-size: 0.8rem;
                color: var(--muted);
                line-height: 1.7;
                margin-bottom: 14px;
            }

            .btn {
                background: linear-gradient(
                    135deg,
                    var(--green-light),
                    var(--green)
                );
                border: 1px solid var(--gold);
                color: var(--gold-light);
                font-family: "Raleway", sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: uppercase;
                padding: 13px 32px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s;
                width: 100%;
            }

            .btn:hover {
                background: linear-gradient(
                    135deg,
                    #3a7a58,
                    var(--green-light)
                );
                box-shadow: 0 4px 20px rgba(201, 168, 76, 0.2);
                transform: translateY(-1px);
            }

            /* ATTENDANCE */
            #attendanceSection {
                display: none;
            }

            .attend-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 14px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .attend-actions {
                display: flex;
                gap: 8px;
            }

            .attend-stats {
                font-size: 0.85rem;
                color: var(--muted);
                background: rgba(201, 168, 76, 0.05);
                padding: 6px 12px;
                border-radius: 20px;
                border: 1px solid rgba(201, 168, 76, 0.1);
            }

            .attend-stats b {
                color: var(--gold-light);
            }

            .attend-group {
                margin-bottom: 16px;
            }

            .attend-group-title {
                font-size: 0.63rem;
                letter-spacing: 2px;
                color: var(--gold);
                font-weight: 700;
                text-transform: uppercase;
                margin-bottom: 8px;
            }

            .attend-members {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .attend-chip {
                display: flex;
                align-items: center;
                gap: 10px;
                background: rgba(14, 26, 18, 0.7);
                border: 1px solid rgba(201, 168, 76, 0.2);
                border-radius: 40px;
                padding: 8px 16px 8px 10px;
                cursor: pointer;
                transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
                user-select: none;
                min-height: 44px;
                /* Better touch target */
            }

            .attend-chip:hover {
                border-color: var(--gold);
                background: rgba(201, 168, 76, 0.1);
                transform: translateY(-2px);
            }

            .attend-chip.present {
                background: rgba(42, 94, 66, 0.5);
                border-color: var(--gold);
            }

            .attend-chip.present .tick {
                opacity: 1;
                transform: scale(1);
            }

            .attend-chip.absent .tick {
                opacity: 0;
                transform: scale(0.5);
            }

            .attend-chip.absent .name-lbl {
                opacity: 0.4;
                text-decoration: line-through;
            }

            .tick {
                width: 18px;
                height: 18px;
                background: var(--gold);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                color: var(--dark);
                flex-shrink: 0;
                transition: all 0.18s;
            }

            .tick::after {
                content: "✓";
                font-weight: 900;
            }

            .name-lbl {
                font-size: 0.82rem;
                color: var(--text);
                font-weight: 600;
                transition: opacity 0.18s;
            }

            .page-badge {
                font-size: 0.7rem;
                color: var(--gold);
                font-weight: 700;
                font-family: "Amiri", serif;
                flex-shrink: 0;
            }

                border: 1px solid var(--gold-light);
                color: var(--gold-light);
                font-family: "Raleway", sans-serif;
                font-size: 0.85rem;
